<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse Games — GameVault</title>
  <meta name="description" content="Search and filter live video game data by genre and platform." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ============ NAV ============ -->
  <nav class="navbar navbar-expand-lg gv-nav">
    <div class="container">
      <a class="navbar-brand" href="index.html"><span class="bracket">[</span>GameVault<span class="bracket">]</span></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#gvNavContent" aria-controls="gvNavContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="gvNavContent">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">HOME</a></li>
          <li class="nav-item"><a class="nav-link" href="games.html">BROWSE GAMES</a></li>
          <li class="nav-item"><a class="nav-link" href="retro.html">RETRO SHELF</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container section">
    <div class="section-heading">
      <h2>BROWSE GAMES</h2>
      <span class="section-note">Live data via RAWG API</span>
    </div>

    <!-- Filters — client-side over the fetched batch -->
    <div class="filter-bar row g-3 align-items-end">
      <div class="col-md-5">
        <label for="searchInput">Search by name</label>
        <input type="text" id="searchInput" class="form-control" placeholder="e.g. Zelda, Halo, Portal…" autocomplete="off" />
      </div>
      <div class="col-md-4">
        <label for="genreSelect">Genre</label>
        <select id="genreSelect" class="form-select">
          <option value="">Loading genres…</option>
        </select>
      </div>
      <div class="col-md-3">
        <label for="platformSelect">Platform</label>
        <select id="platformSelect" class="form-select">
          <option value="">Loading platforms…</option>
        </select>
      </div>
    </div>

    <p id="resultsCount" class="results-count d-none"></p>

    <div id="stateEl" class="state-panel"></div>

    <div id="gamesGrid" class="row g-4 d-none"></div>
  </main>

  <footer class="gv-footer">
    <div class="container d-flex flex-wrap justify-content-between gap-2">
      <p>GameVault — Full Stack Development Final Project, 2026</p>
      <p>Game data via RAWG Video Games Database API</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/games.js"></script>
  <script src="js/nav.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const api = new GameVaultAPI(GV_CONFIG.RAWG_API_KEY, GV_CONFIG.RAWG_BASE_URL);
      const browser = new GameBrowser(api, {
        grid: document.getElementById("gamesGrid"),
        count: document.getElementById("resultsCount"),
        searchInput: document.getElementById("searchInput"),
        genreSelect: document.getElementById("genreSelect"),
        platformSelect: document.getElementById("platformSelect"),
        state: document.getElementById("stateEl"),
      });
      browser.init();
    });
  </script>
</body>
</html>
